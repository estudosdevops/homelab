# addons/ingress-nginx/values.yaml
metadata:
  annotations:
    app.kubernetes.io/description: "Ingress Controller NGINX para homelab"
    argocd.argoproj.io/sync-wave: "2"

# Project específico (opcional, se não definir usa o global)
project: ingress-nginx

chart:
  repository: https://kubernetes.github.io/ingress-nginx
  name: ingress-nginx
  version: "4.13.1"

destination:
  namespace: ingress-nginx

syncPolicy:
  automated:
    prune: true
    selfHeal: true
  syncOptions:
    - CreateNamespace=true
    - ServerSideApply=true

helm:
  values:
    # Controller - Componente principal do ingress
    controller:
      # Configurações de deployment
      replicaCount: 1

      # Service - LoadBalancer usando MetalLB
      service:
        type: LoadBalancer
        annotations:
          metallb.universe.tf/loadBalancer-name: "ingress-nginx"

      # Configurações de recursos para homelab
      resources:
        requests:
          cpu: 100m
          memory: 128Mi
        limits:
          cpu: 500m
          memory: 512Mi

      # IngressClass - Controlador padrão
      ingressClassResource:
        name: nginx
        enabled: true
        default: true
        controllerValue: "k8s.io/ingress-nginx"

      # Configurações de observabilidade
      metrics:
        enabled: true
        serviceMonitor:
          enabled: false  # Habilitar quando Prometheus estiver migrado
        prometheusRule:
          enabled: false

      # Configurações de segurança
      allowSnippetAnnotations: false

      # Configurações globais do nginx
      config:
        # Performance
        worker-processes: "auto"
        worker-connections: "1024"

        # Security headers
        use-forwarded-headers: "true"
        compute-full-forwarded-for: "true"

        # SSL/TLS
        ssl-protocols: "TLSv1.2 TLSv1.3"
        ssl-ciphers: "ECDHE-ECDSA-AES128-GCM-SHA256,ECDHE-RSA-AES128-GCM-SHA256,ECDHE-ECDSA-AES256-GCM-SHA384,ECDHE-RSA-AES256-GCM-SHA384"

        # Timeouts
        proxy-connect-timeout: "5"
        proxy-send-timeout: "60"
        proxy-read-timeout: "60"

        # Body size
        proxy-body-size: "10m"

    # Default backend - Página 404 customizada
    defaultBackend:
      enabled: true
      image:
        repository: registry.k8s.io/defaultbackend-amd64
        tag: "1.5"
      resources:
        requests:
          cpu: 10m
          memory: 20Mi
        limits:
          cpu: 50m
          memory: 50Mi
