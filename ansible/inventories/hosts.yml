---
all:
  vars:
    control_plane_endpoint: 192.168.20.105
    load_balancer_ip_pool:
      - 192.168.20.101
    domain: homelab.tech
k3s:
  children:
    masters:
      hosts:
        master0:
          {
            ansible_host: 192.168.15.105,
            ansible_user: ubuntu,
            ansible_become: true,
          }
    workers:
      hosts:
        worker0:
          {
            ansible_host: 192.168.15.106,
            ansible_user: ubuntu,
            ansible_become: true,
          }
raspberrypi:
  hosts:
    adguardhome:
      {
        ansible_host: 192.168.10.2,
        ansible_user: pi,
        ansible_become: true,
        ansible_password: "{{ adguardhome_ssh_password }}",
      }
mikrotik:
  hosts:
    rb-home:
      {
        ansible_host: 192.168.10.1,
        ansible_user: "{{ mikrotik_api_user }}",
        ansible_connection: local,
        ansible_password: "{{ mikrotik_api_password }}",
      }

proxmox:
  vars:
    ansible_user: root
    ansible_become: true
    ansible_password: "{{ proxmox_root_password }}"

  hosts:
    pve01:
      ansible_host: 192.168.20.2

    pve02:
      ansible_host: 192.168.20.3

    pve03:
      ansible_host: 192.168.20.4

    pve04:
      ansible_host: 192.168.20.5
