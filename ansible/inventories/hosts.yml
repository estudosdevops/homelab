---
all:
  vars:
    control_plane_endpoint: 192.168.15.105
    load_balancer_ip_pool:
      - 192.168.15.101
    domain: homelab.tech
    pihole_ip: 192.168.15.102
    ansible_python_interpreter: /usr/bin/python3
k3s:
  children:
    masters:
      hosts:
        master0: {ansible_host: 192.168.15.105, ansible_user: ubuntu, ansible_become: true}
    workers:
      hosts:
        worker0: {ansible_host: 192.168.15.106, ansible_user: ubuntu, ansible_become: true}
raspberrypi:
  hosts:
    adguardhome: {ansible_host: 192.168.10.2, ansible_user: pi, ansible_become: true, ansible_password: '{{ ansible_ssh_password }}'}
mikrotik:
  hosts:
    rb-home: {ansible_host: 192.168.10.1, ansible_user: "{{ mikrotik_api_user }}", ansible_connection: local, ansible_password: '{{ mikrotik_api_password }}'}
