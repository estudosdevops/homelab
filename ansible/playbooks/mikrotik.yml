---
- name: Configure MikroTik RB_HOME
  hosts: mikrotik
  gather_facts: false

  module_defaults:
    group/community.routeros.api:
      hostname: "{{ ansible_host }}"
      username: "{{ ansible_user }}"
      password: "{{ ansible_password }}"
      tls: false
      validate_certs: false

  tasks:
    - name: Apply mikrotik role
      ansible.builtin.import_role:
        name: mikrotik
