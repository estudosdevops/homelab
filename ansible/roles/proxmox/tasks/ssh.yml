---
- name: Check if root SSH key exists
  ansible.builtin.stat:
    path: /root/.ssh/id_ed25519
  register: ssh_key

- name: Generate root SSH key
  ansible.builtin.command:
    cmd: ssh-keygen -t ed25519 -f /root/.ssh/id_ed25519 -N ""
  when:
    - inventory_hostname == proxmox_cluster_master
    - not ssh_key.stat.exists

- name: Read public SSH key
  ansible.builtin.slurp:
    src: /root/.ssh/id_ed25519.pub
  register: ssh_public_key
  when:
    - inventory_hostname == proxmox_cluster_master

- name: Configure authorized_keys
  ansible.posix.authorized_key:
    user: root
    key: "{{ hostvars[proxmox_cluster_master].ssh_public_key.content | b64decode }}"
    state: present

- name: Configure known_hosts
  ansible.builtin.template:
    src: known_hosts.j2
    dest: /root/.ssh/known_hosts
    owner: root
    group: root
    mode: "0644"
