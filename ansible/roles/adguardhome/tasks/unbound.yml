---
# tasks/unbound.yml
- name: Install Unbound
  ansible.builtin.apt:
    name: unbound
    state: present
    update_cache: true

- name: Ensure Unbound configuration directory exists
  ansible.builtin.file:
    path: /etc/unbound/unbound.conf.d
    state: directory
    owner: root
    group: root
    mode: 0755

- name: Deploy Unbound configuration
  ansible.builtin.template:
    src: unbound.conf.j2
    dest: "{{ unbound_config_file }}"
    owner: root
    group: root
    mode: 0644
    validate: 'unbound-checkconf %s'
  notify: restart unbound

- name: Download root hints file
  ansible.builtin.get_url:
    url: https://www.internic.net/domain/named.root
    dest: "{{ unbound_root_hints_file }}"
    owner: root
    group: root
    mode: 0644
  when: unbound_download_root_hints

- name: Generate root key anchor
  ansible.builtin.command:
    cmd: unbound-anchor -a "{{ unbound_root_key_file }}"
    creates: "{{ unbound_root_key_file }}"
  when: unbound_enable_dnssec

- name: Set permissions on root key file
  ansible.builtin.file:
    path: "{{ unbound_root_key_file }}"
    owner: unbound
    group: unbound
    mode: 0644
  when: unbound_enable_dnssec

- name: Ensure Unbound is started and enabled on boot
  ansible.builtin.service:
    name: unbound
    state: started
    enabled: true
