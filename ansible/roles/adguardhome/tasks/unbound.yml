---
- name: Install Unbound
  ansible.builtin.apt:
    name: unbound
    state: present
    update_cache: true

- name: Ensure unbound data directory exists
  ansible.builtin.file:
    path: "{{ item.path }}"
    state: directory
    owner: "{{ item.owner | default('root') }}"
    group: "{{ item.group | default('root') }}"
    mode: "{{ item.mode | default('0755') }}"
  loop:
    - { path: /etc/unbound/unbound.conf.d }
    - { path: /var/lib/unbound, owner: unbound, group: unbound }

- name: Download root hints file
  ansible.builtin.get_url:
    url: https://www.internic.net/domain/named.root
    dest: "{{ unbound_root_hints_file }}"
    owner: root
    group: root
    mode: 644
  when: unbound_download_root_hints

- name: Deploy Unbound configuration
  ansible.builtin.template:
    src: unbound.conf.j2
    dest: "{{ unbound_config_file }}"
    owner: root
    group: root
    mode: 644
    validate: "unbound-checkconf %s"
  notify: restart unbound

- name: Generate root key anchor
  ansible.builtin.command:
    cmd: unbound-anchor -a "{{ unbound_root_key_file }}"
    creates: "{{ unbound_root_key_file }}"
  when: unbound_enable_dnssec

- name: Ensure Unbound is started and enabled on boot
  ansible.builtin.service:
    name: unbound
    state: started
    enabled: true
