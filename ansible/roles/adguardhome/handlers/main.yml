---
- name: restart adguardhome
  ansible.builtin.service:
    name: "{{ adguardhome_daemon }}"
    state: restarted

- name: restart unbound
  ansible.builtin.service:
    name: unbound
    state: restarted

- name: restart log2ram
  systemd:
    name: log2ram
    state: restarted

- name: restart journald
  systemd:
    name: systemd-journald
    state: restarted
