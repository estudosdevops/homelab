---
- name: Create Alertmanager group
  ansible.builtin.group:
    name: "{{ alertmanager.user }}"
    system: true

- name: Create Alertmanager user
  ansible.builtin.user:
    name: "{{ alertmanager.user }}"
    system: true
    shell: /usr/sbin/nologin

- name: Create Alertmanager directories
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    owner: "{{ alertmanager.user }}"
    group: "{{ alertmanager.user }}"
    mode: "0755"
  loop:
    - /etc/alertmanager
    - /var/lib/alertmanager

- name: Download Alertmanager
  ansible.builtin.get_url:
    url: "https://github.com/prometheus/alertmanager/releases/download/v{{ alertmanager.version }}/alertmanager-{{ alertmanager.version }}.linux-amd64.tar.gz"
    dest: "/tmp/alertmanager-{{ alertmanager.version }}.tar.gz"
    mode: "0644"

- name: Extract Alertmanager
  ansible.builtin.unarchive:
    src: "/tmp/alertmanager-{{ alertmanager.version }}.tar.gz"
    dest: /tmp
    remote_src: true
    creates: "/tmp/alertmanager-{{ alertmanager.version }}.linux-amd64"

- name: Install Alertmanager binaries
  ansible.builtin.copy:
    src: "/tmp/alertmanager-{{ alertmanager.version }}.linux-amd64/{{ item }}"
    dest: "/usr/local/bin/{{ item }}"
    owner: root
    group: root
    mode: "0755"
    remote_src: true
  loop:
    - alertmanager
    - amtool
  notify: Restart Alertmanager

- name: Install Alertmanager templates
  ansible.builtin.template:
    src: "{{ item.src }}"
    dest: "{{ item.dest }}"
    owner: root
    group: "{{ alertmanager.user }}"
    mode: "{{ item.mode }}"
  loop:
    - src: alertmanager/default.j2
      dest: /etc/default/alertmanager
      mode: "0644"

    - src: alertmanager/config.yml.j2
      dest: /etc/alertmanager/alertmanager.yml
      mode: "0640"

    - src: alertmanager/service.j2
      dest: /etc/systemd/system/alertmanager.service
      mode: "0644"
  notify:
    - Reload systemd
    - Restart Alertmanager

- name: Enable Alertmanager
  ansible.builtin.systemd:
    name: alertmanager
    enabled: true
    state: started

- name: Remove installation files
  ansible.builtin.file:
    path: "{{ item }}"
    state: absent
  loop:
    - "/tmp/alertmanager-{{ alertmanager.version }}.tar.gz"
    - "/tmp/alertmanager-{{ alertmanager.version }}.linux-amd64"
