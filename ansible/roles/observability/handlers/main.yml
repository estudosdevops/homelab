---
- name: Restart Grafana
  ansible.builtin.systemd:
    name: grafana-server
    state: restarted

- name: Restart Prometheus
  ansible.builtin.systemd:
    name: prometheus
    state: restarted

- name: Restart Alloy
  ansible.builtin.systemd:
    name: alloy
    state: restarted

- name: Reload systemd
  ansible.builtin.systemd:
    daemon_reload: true

- name: Restart pve exporter
  ansible.builtin.systemd:
    name: pve-exporter
    state: restarted
    enabled: true

- name: Restart Alertmanager
  ansible.builtin.systemd:
    name: alertmanager
    state: restarted
