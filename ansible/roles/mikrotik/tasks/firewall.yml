---
# =========================================================
# FIREWALL - INPUT CHAIN
# Protect MikroTik itself
# =========================================================
- name: INPUT | Accept established and related
  community.routeros.api_modify:
    path: ip firewall filter
    data:
      - chain: input
        connection-state: established,related
        action: accept
        comment: "INPUT established"

- name: INPUT | Drop invalid
  community.routeros.api_modify:
    path: ip firewall filter
    data:
      - chain: input
        connection-state: invalid
        action: drop
        comment: "INPUT invalid"

- name: INPUT | Allow ICMP
  community.routeros.api_modify:
    path: ip firewall filter
    data:
      - chain: input
        protocol: icmp
        action: accept
        comment: "INPUT icmp"

- name: INPUT | Allow HOME access to router
  community.routeros.api_modify:
    path: ip firewall filter
    data:
      - chain: input
        src-address: "{{ mikrotik_networks.home.network }}"
        action: accept
        comment: "INPUT home access"

- name: INPUT | Drop everything else
  community.routeros.api_modify:
    path: ip firewall filter
    data:
      - chain: input
        action: drop
        comment: "INPUT drop"

# =========================================================
# FIREWALL - FORWARD CHAIN
# Traffic passing through router
# =========================================================
- name: FORWARD | Accept established and related
  community.routeros.api_modify:
    path: ip firewall filter
    data:
      - chain: forward
        connection-state: established,related
        action: accept
        comment: "FORWARD established"

- name: FORWARD | Drop invalid
  community.routeros.api_modify:
    path: ip firewall filter
    data:
      - chain: forward
        connection-state: invalid
        action: drop
        comment: "FORWARD invalid"

# =========================================================
# INTERNET ACCESS
# =========================================================
- name: FORWARD | HOME to Internet
  community.routeros.api_modify:
    path: ip firewall filter
    data:
      - chain: forward
        src-address: "{{ mikrotik_networks.home.network }}"
        out-interface: "{{ mikrotik_pppoe.name }}"
        action: accept
        comment: "HOME internet"

- name: FORWARD | HOMELAB to Internet
  community.routeros.api_modify:
    path: ip firewall filter
    data:
      - chain: forward
        src-address: "{{ mikrotik_networks.homelab.network }}"
        out-interface: "{{ mikrotik_pppoe.name }}"
        action: accept
        comment: "HOMELAB internet"

# =========================================================
# ALLOWED HOME HOSTS -> HOMELAB
# =========================================================
- name: FORWARD | Allow selected HOME hosts to HOMELAB
  community.routeros.api_modify:
    path: ip firewall filter
    data:
      - chain: forward
        src-address: "{{ item }}"
        dst-address: "{{ mikrotik_networks.homelab.network }}"
        action: accept
        comment: "Allowed HOME host"
  loop: "{{ mikrotik_homelab_allowed_hosts }}"

# =========================================================
# INTER-NETWORK ISOLATION
# =========================================================
- name: FORWARD | Block HOME to HOMELAB
  community.routeros.api_modify:
    path: ip firewall filter
    data:
      - chain: forward
        src-address: "{{ mikrotik_networks.home.network }}"
        dst-address: "{{ mikrotik_networks.homelab.network }}"
        action: drop
        comment: "Block HOME to HOMELAB"

- name: FORWARD | Block HOMELAB to HOME
  community.routeros.api_modify:
    path: ip firewall filter
    data:
      - chain: forward
        src-address: "{{ mikrotik_networks.homelab.network }}"
        dst-address: "{{ mikrotik_networks.home.network }}"
        action: drop
        comment: "Block HOMELAB to HOME"
