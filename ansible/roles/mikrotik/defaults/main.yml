---
mikrotik_api_user: admin
mikrotik_api_password: ""

mikrotik_identity: RB_HOME

mikrotik_pppoe:
  enabled: true
  interface: ether1
  name: pppoe-vivo
  user: ""
  password: ""

mikrotik_bridges:
  - name: home
    ports:
      - ether2
      - ether3
      - ether4

  - name: homelab
    ports:
      - ether5

mikrotik_networks:
  home:
    bridge: home
    network: 192.168.10.0/24
    gateway: 192.168.10.1/24

    dhcp:
      enabled: true
      pool_start: 192.168.10.11
      pool_end: 192.168.10.254
      dns: 192.168.10.2

  homelab:
    bridge: homelab
    network: 192.168.20.0/24
    gateway: 192.168.20.1/24

    dhcp:
      enabled: true
      pool_start: 192.168.20.100
      pool_end: 192.168.20.254
      dns: 192.168.20.6

mikrotik_dhcp_reservations:
  - address: 192.168.20.10
    mac-address: "BC:24:11:AA:BB:01"
    server: homelab
    comment: "ansible:reserved - kube-prod-cp0"

  - address: 192.168.20.11
    mac-address: "BC:24:11:AA:BB:02"
    server: homelab
    comment: "ansible:reserved - kube-prod-cp1"

  - address: 192.168.20.12
    mac-address: "BC:24:11:AA:BB:03"
    server: homelab
    comment: "ansible:reserved - kube-prod-cp2"

mikrotik_homelab_allowed_hosts:
  - 192.168.10.143

mikrotik_firewall_input:
  - chain: input
    connection-state: established,related
    action: accept
    comment: ansible:input established,related
  - chain: input
    connection-state: invalid
    action: drop
    comment: ansible:input invalid
  - chain: input
    protocol: icmp
    action: accept
    comment: ansible:input icmp
  - chain: input
    src-address: "{{ mikrotik_networks.home.network }}"
    action: accept
    comment: ansible:input home to router
  - chain: input
    action: drop
    comment: ansible:input drop final

# Forward rules before per-host allows (HOME -> homelab LAN).
mikrotik_firewall_forward_before_host_allows:
  - chain: forward
    connection-state: established,related
    action: accept
    comment: ansible:forward established,related
  - chain: forward
    connection-state: invalid
    action: drop
    comment: ansible:forward invalid
  - chain: forward
    src-address: "{{ mikrotik_networks.home.network }}"
    out-interface: "{{ mikrotik_pppoe.name }}"
    action: accept
    comment: ansible:forward home to wan
  - chain: forward
    src-address: "{{ mikrotik_networks.homelab.network }}"
    out-interface: "{{ mikrotik_pppoe.name }}"
    action: accept
    comment: ansible:forward homelab to wan

# allows and before inter-VLAN drops. Tune or set to [] if unused.
mikrotik_firewall_forward_homelab_services:
  - chain: forward
    src-address: "{{ mikrotik_networks.home.network }}"
    dst-address: 192.168.20.6
    protocol: udp
    dst-port: "53"
    action: accept
    comment: ansible:forward home to homelab adguard udp53
  - chain: forward
    src-address: "{{ mikrotik_networks.home.network }}"
    dst-address: 192.168.20.6
    protocol: tcp
    dst-port: "53"
    action: accept
    comment: ansible:forward home to homelab adguard tcp53
  - chain: forward
    src-address: "{{ mikrotik_networks.home.network }}"
    dst-address: 192.168.20.7
    protocol: tcp
    dst-port: "80,443"
    action: accept
    comment: ansible:forward home to homelab npm
  - chain: forward
    src-address: "{{ mikrotik_networks.home.network }}"
    dst-address: 192.168.20.240
    protocol: tcp
    dst-port: "80,443"
    action: accept
    comment: ansible:forward home to homelab gateway-api-k8s

# Forward rules after per-host allows (inter-network isolation).
mikrotik_firewall_forward_after_host_allows:
  - chain: forward
    src-address: "{{ mikrotik_networks.home.network }}"
    dst-address: "{{ mikrotik_networks.homelab.network }}"
    action: drop
    comment: ansible:forward block home to homelab
  - chain: forward
    src-address: "{{ mikrotik_networks.homelab.network }}"
    dst-address: "{{ mikrotik_networks.home.network }}"
    action: drop
    comment: ansible:forward block homelab to home

mikrotik_dns:
  servers:
    - 192.168.10.2
  allow_remote_requests: false
  cache_size: 4096

mikrotik_port_forwards: []
