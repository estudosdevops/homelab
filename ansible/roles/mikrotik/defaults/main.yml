---
# =========================================================
# Credentials
# =========================================================

mikrotik_api_user: admin
mikrotik_api_password: ""

# =========================================================
# System
# =========================================================
mikrotik_identity: RB_HOME

# =========================================================
# WAN
# =========================================================
mikrotik_pppoe:
  enabled: true
  interface: ether1
  name: pppoe-vivo
  user: ""
  password: ""

# =========================================================
# Bridges
# =========================================================
mikrotik_bridges:
  - name: home
    ports:
      - ether2
      - ether3
      - ether4

  - name: homelab
    ports:
      - ether5

# =========================================================
# Networks
# =========================================================
mikrotik_networks:
  home:
    bridge: home
    network: 192.168.10.0/24
    gateway: 192.168.10.1/24

    dhcp:
      enabled: true
      pool_start: 192.168.10.11
      pool_end: 192.168.10.254
      dns: 192.168.10.2

  homelab:
    bridge: homelab
    network: 192.168.20.0/24
    gateway: 192.168.20.1/24

    dhcp:
      enabled: true
      pool_start: 192.168.20.61
      pool_end: 192.168.20.254
      dns: 1.1.1.1

# =========================================================
# Allowed Hosts
# =========================================================
mikrotik_homelab_allowed_hosts:
  - 192.168.10.143

# =========================================================
# DNS
# =========================================================
mikrotik_dns:
  servers:
    - 192.168.10.2

  allow_remote_requests: false
  cache_size: 4096

# =========================================================
# Port Forward
# =========================================================
mikrotik_port_forwards: []
