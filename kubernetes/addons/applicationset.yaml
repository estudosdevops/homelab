apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: addons
  namespace: argocd
spec:
  goTemplate: true
  generators:
    - matrix:
        generators:
          - git:
              repoURL: https://github.com/estudosdevops/homelab.git
              revision: refactor/homelab
              files:
                - path: kubernetes/addons/*/config.yaml
              pathParamPrefix: addon
          - clusters: {}
              # selector:
              #  matchLabels:
              #    addons: enabled
  template:
    metadata:
      name: "{{ .name }}"
      labels:
        app.kubernetes.io/name: "{{ .name }}"
        app.kubernetes.io/managed-by: argocd
        app.kubernetes.io/part-of: addons
    spec:
      project: addons
      destination:
        server: "{{ .server }}"
        namespace: "{{ .namespace }}"
      sources:
        # Chart upstream
        - repoURL: "{{ .source.repoURL }}"
          chart: "{{ .source.chart }}"
          targetRevision: "{{ .addon.source.targetRevision }}"
          helm:
            valueFiles:
              - "$values/kubernetes/addons/{{ .name }}/values/common.yaml"
              - "$values/kubernetes/addons/{{ .name }}/values/{{ .name }}.yaml"
            ignoreMissingValueFiles: true
        # Repo GitOps
        - repoURL: https://github.com/estudosdevops/homelab.git
          targetRevision: refactor/homelab
          ref: values
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
        syncOptions:
          - CreateNamespace=true
