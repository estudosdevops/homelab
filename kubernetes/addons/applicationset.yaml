apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: addons
  namespace: argocd
spec:
  goTemplate: true
  generators:
    - matrix:
        generators:
          - git:
              repoURL: https://github.com
              revision: refactor/homelab
              files:
                - path: kubernetes/addons/*/config.yaml
          - clusters: {}
              # selector:
              #  matchLabels:
              #    addons: enabled
  template:
    metadata:
      name: "{{ .name }}"
      labels:
        app.kubernetes.io/name: "{{ .name }}"
        app.kubernetes.io/managed-by: argocd
        app.kubernetes.io/part-of: addons
    spec:
      project: addons
      destination:
        server: "{{ .server }}"
        namespace: "{{ .namespace }}"
      source:
        repoURL: https://github.com
        targetRevision: refactor/homelab
        path: kubernetes/addons/{{ .name }}

        helm:
          valueFiles:
            - values/common.yaml
            - values/{{ .clusterName }}.yaml
          ignoreMissingValueFiles: true

      syncPolicy:
        automated:
          prune: true
          selfHeal: true
        syncOptions:
          - CreateNamespace=true
{{ if .serverSideApply }}          - ServerSideApply=true{{ end }}
