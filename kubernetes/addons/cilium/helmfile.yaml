---
bases:
  - "../bases/helmDefaults.yaml"

---
repositories:
  - name: cilium
    url: https://helm.cilium.io

releases:
  - name: cilium
    namespace: kube-system
    chart: cilium/cilium
    version: ~1.18.1
    installed: true
    labels:
      tier: cilium
    values:
      - values/values.yaml.gotmpl
    disableValidationOnInstall: true
