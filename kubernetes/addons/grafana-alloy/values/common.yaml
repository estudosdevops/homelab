---
alloy:
  controller:
    tolerations:
      - key: node-role.kubernetes.io/control-plane
        operator: Exists
        effect: NoSchedule

      - key: node-role.kubernetes.io/master
        operator: Exists
        effect: NoSchedule

    volumes:
      extra:
        - name: host-root
          hostPath:
            path: /
        - name: host-proc
          hostPath:
            path: /proc
        - name: host-sys
          hostPath:
            path: /sys

  alloy:
    extraEnv:
      - name: K8S_NODE_NAME
        valueFrom:
          fieldRef:
            fieldPath: spec.nodeName

      - name: CLUSTER_NAME
        value: homelab-prod

    mounts:
      extra:
        - name: host-root
          mountPath: /host/root
          readOnly: true
        - name: host-proc
          mountPath: /host/proc
          readOnly: true
        - name: host-sys
          mountPath: /host/sys
          readOnly: true

    configMap:
      content: |-
        logging {
          level = "info"
        }

        prometheus.exporter.unix "node" {
          procfs_path = "/host/proc"
          sysfs_path  = "/host/sys"
          rootfs_path = "/host/root"
        }

        discovery.relabel "node" {
          targets = prometheus.exporter.unix.node.targets
          rule {
            target_label = "node_name"
            replacement  = sys.env("K8S_NODE_NAME")
          }
          rule {
            target_label = "job"
            replacement  = "linux/node"
          }
        }

        prometheus.scrape "node" {
          targets = discovery.relabel.node.output
          forward_to = [
            prometheus.remote_write.prometheus.receiver,
          ]
          scrape_interval = "30s"
        }

        prometheus.remote_write "prometheus" {
          external_labels = {
            cluster = sys.env("CLUSTER_NAME"),
            datacenter = "home",
            platform = "kubernetes",
            environment = "production",
          }
          endpoint {
            url = "http://192.168.20.21:9090/api/v1/write"
          }
        }
