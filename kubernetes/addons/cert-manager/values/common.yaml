installCRDs: true

prometheus:
  enabled: false

extraObjects:
  - |
    apiVersion: cert-manager.io/v1
    kind: ClusterIssuer
    metadata:
      name: selfsigned-issuer
    spec:
      selfSigned: {}

  - |
    apiVersion: cert-manager.io/v1
    kind: Certificate
    metadata:
      name: homelab-ca
      namespace: cert-manager
    spec:
      isCA: true
      commonName: "Homelab Root CA"
      subject:
        organizations:
          - "Homelab"
      secretName: homelab-ca
      privateKey:
        algorithm: ECDSA
        size: 256
      issuerRef:
        name: selfsigned-issuer
        kind: ClusterIssuer

  - |
    apiVersion: cert-manager.io/v1
    kind: ClusterIssuer
    metadata:
      name: homelab-ca-issuer
    spec:
      ca:
        secretName: homelab-ca

  - |
    apiVersion: cert-manager.io/v1
    kind: Certificate
    metadata:
      name: wildcard-cert
      namespace: cert-manager
    spec:
      secretName: wildcard-tls
      commonName: "*.homelab.tech"
      dnsNames:
        - "*.homelab.tech"
        - "homelab.tech"
      duration: 8760h
      renewBefore: 720h
      issuerRef:
        name: homelab-ca-issuer
        kind: ClusterIssuer
