apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: vault-issuer
spec:
  vault:
    server: https://vault.homelab.tech
    path: pki_int/sign/homelab-dot-tech
    caBundleSecretRef:
      name: vault-tls-ca-secret
      key: ca.crt
    auth:
      kubernetes:
        role: cert-manager
        mountPath: /v1/auth/kubernetes
        serviceAccountRef:
          name: vault-issuer
          namespace: cert-manager
