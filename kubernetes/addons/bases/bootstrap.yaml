---
apiVersion: argoproj.io/v1alpha1
kind: AppProject
metadata:
  name: addons-of-addons
  namespace: argocd
  labels:
    app.kubernetes.io/name: addons
    app.kubernetes.io/managed-by: argocd
spec:
  description: Cluster addons
  sourceRepos:
    - "*"
  destinations:
    - namespace: "*"
      server: "*"
  clusterResourceWhitelist:
    - group: "*"
      kind: "*"
---
apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: addons-generation
  namespace: argocd
  labels:
    app.kubernetes.io/name: addons
    app.kubernetes.io/managed-by: argocd
spec:
  goTemplate: true
  generators:
    - git:
        repoURL: https://github.com/estudosdevops/homelab.git
        revision: refactor/homelab
        directories:
          - path: kubernetes/addons/*
          - path: kubernetes/addons/manager
            exclude: true
  template:
    metadata:
      name: "{{ .path.basename }}-appset"
      labels:
        app.kubernetes.io/part-of: addons
        app.kubernetes.io/managed-by: addons-root
    spec:
      project: addons-of-addons
      source:
        repoURL: https://github.com/estudosdevops/homelab.git
        targetRevision: refactor/homelab
        path: kubernetes/addons/manager
        helm:
          parameters:
            - name: addonName
              value: "{{ .path.basename }}"
      destination:
        server: https://kubernetes.default.svc
        namespace: argocd
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
        syncOptions:
          - CreateNamespace=true
