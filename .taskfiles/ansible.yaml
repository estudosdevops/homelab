version: "3"

tasks:
  init:
    desc: Setup Ansible environment
    dir: "{{.ROOT_DIR}}/ansible"
    cmds:
      - pip install --break-system-packages -r requirements.txt
      - ansible-galaxy collection install -r requirements.yml
    preconditions:
      - test -f requirements.txt
      - test -f requirements.yml

  run:
    internal: true
    requires:
      vars: [playbook]
    vars:
      MODE: '{{.MODE | default ""}}'
    dir: "{{.ROOT_DIR}}/ansible"
    preconditions:
      - test -f playbooks/{{.playbook}}.yml
    cmd: >
      ansible-playbook playbooks/{{.playbook}}.yml
      {{.MODE}}
      {{if .tags}}--tags {{.tags}}{{end}}
      {{if .limit}}--limit {{.limit}}{{end}}
      {{if .extra_vars}}--extra-vars '{{.extra_vars}}'{{end}}

  plan:
    desc: Executa playbook em modo check
    cmds:
      - task: run
        vars:
          playbook: "{{.playbook}}"
          MODE: "--check --diff"

  apply:
    desc: Executa playbook
    cmds:
      - task: run
        vars:
          playbook: "{{.playbook}}"
