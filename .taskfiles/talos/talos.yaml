version: "3"

tasks:
  generate-config:
    desc: Gera configs Talos
    dir: "{{.CLUSTERS_DIR}}"
    cmds:
      - talhelper genconfig -e {{.TALOS_DIR}}/talenv.yaml
    preconditions:
      - test -f talconfig.yaml
      - test -f {{.ROOT_DIR}}/.sops.yaml
      - test -f {{.SOPS_AGE_KEY_FILE}}
      - which talhelper

  apply-node:
    desc: Aplica config Talos em node
    requires:
      vars: [IP]
    vars:
      MODE: '{{.MODE | default "auto"}}'
    dir: "{{.CLUSTERS_DIR}}"
    cmds:
      - talhelper gencommand apply -e {{.TALOS_DIR}}/talenv.yaml --node {{.IP}} --extra-flags '--mode={{.MODE}}' | bash
    preconditions:
      - test -f talconfig.yaml
      - which talhelper talosctl yq

  upgrade-node:
    desc: Atualize o Talos em um único nó. [IP=required]
    dir: "{{.TALOS_DIR}}"
    cmd: >-
      talhelper gencommand upgrade --config-file {{.CLUSTERS_DIR}}/talconfig.yaml --node {{.IP}}
      --extra-flags "--talosconfig={{.TALOSCONFIG}} --image='{{.TALOS_IMAGE}}:{{.TALOS_VERSION}}' --timeout=10m" | bash
    vars:
      TALOS_IMAGE:
        sh: yq '.nodes[] | select(.ipAddress == "{{.IP}}") | .talosImageURL' {{.CLUSTERS_DIR}}/talconfig.yaml
      TALOS_VERSION:
        sh: yq '.talosVersion' {{.TALOS_DIR}}/talenv.yaml
    requires:
      vars: [IP]
      preconditions:
        - talosctl --nodes {{.IP}} get machineconfig
        - talosctl config info
        - test -f {{.TALOSCONFIG}}
        - which kubectl talhelper talosctl yq

  upgrade-k8s:
    desc: Atualizar Kubernetes
    dir: "{{.TALOS_DIR}}"
    cmd: talhelper gencommand upgrade-k8s --extra-flags "--to '{{.KUBERNETES_VERSION}}'" | bash
    vars:
      KUBERNETES_VERSION:
        sh: yq '.kubernetesVersion' {{.TALOS_DIR}}/talenv.yaml
    preconditions:
      - talosctl config info
      - test -f {{.TALOSCONFIG}}
      - which talhelper talosctl yq

  reset-k8s:
    desc: Reinicia os nós para o modo de manutenção.
    dir: "{{.TALOS_DIR}}"
    prompt: Isso destruirá seu cluster e reiniciará os nós, retornando-os ao modo de manutenção... continuar?
    cmd: >-
      talhelper gencommand reset --extra-flags="--reboot {{- if eq .CLI_FORCE false }}
      --system-labels-to-wipe STATE --system-labels-to-wipe EPHEMERAL{{ end }} --graceful=false --wait=false" | bash
    preconditions:
      - which talhelper
