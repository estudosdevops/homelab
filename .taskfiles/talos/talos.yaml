version: "3"

tasks:
  generate-config:
    desc: Gera configs Talos
    dir: "{{.TALOS_DIR}}"
    cmds:
      - talhelper genconfig --env-file {{.TALENV_FILE}}
    preconditions:
      - test -f talconfig.yaml
      - test -f {{.TALENV_FILE}}
      - test -f {{.ROOT_DIR}}/.sops.yaml
      - test -f {{.SOPS_AGE_KEY_FILE}}
      - which talhelper

  apply-node:
    desc: Aplica config Talos em node
    requires:
      vars: [IP]
    vars:
      MODE: '{{.MODE | default "auto"}}'
    dir: "{{.TALOS_DIR}}"
    cmds:
      - talhelper gencommand apply --env-file {{.TALENV_FILE}} --node {{.IP}} --extra-flags '--mode={{.MODE}}' | bash
    preconditions:
      - test -f talconfig.yaml
      - which talhelper talosctl yq

  create-k8s:
    desc: Provisiona infraestrutura + bootstrap cluster k8s
    deps:
      - validate
    cmds:
      - task: terragrunt:apply
      - task: bootstrap:talos
      - task: bootstrap:addons

