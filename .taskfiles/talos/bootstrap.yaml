version: "3"

vars:
  # TALENV_FILE: "../talenv.yaml"
  ADDONS:
    - cilium
    - argocd

tasks:
  talos:
    desc: Bootstrap Talos cluster
    dir: "{{.TALOS_DIR}}"
    cmds:
      - "[ -f talsecret.sops.yaml ] || talhelper gensecret | sops --filename-override talsecret.sops.yaml --encrypt /dev/stdin > talsecret.sops.yaml"
      - talhelper genconfig --env-file {{.TALENV_FILE}}
      - talhelper gencommand apply --env-file {{.TALENV_FILE}} --extra-flags="--insecure" | bash
      - until talhelper gencommand bootstrap --env-file {{.TALENV_FILE}} | bash; do sleep 20; done
      - until talhelper gencommand kubeconfig --env-file {{.TALENV_FILE}} --extra-flags '{{.KUBECONFIG}} --force' | bash; do sleep 10; done
    preconditions:
      - test -f talconfig.yaml
      - test -f {{.TALENV_FILE}}
      - test -f {{.ROOT_DIR}}/.sops.yaml
      - test -f {{.SOPS_AGE_KEY_FILE}}
      - which talhelper talosctl sops

  addons:
    desc: Instala Addons no cluster
    cmds:
      - for: { var: ADDONS }
        task: addon-cmd
        vars: { ADDON: "{{.ITEM}}", HELM_CMD: "diff" }
      - task: addon-sync-confirm
    preconditions:
      - which helmfile

  addon-sync-confirm:
    internal: true
    prompt: Deseja continuar com o sync dos addons?
    cmds:
      - for: { var: ADDONS }
        task: addon-cmd
        vars: { ADDON: "{{.ITEM}}", HELM_CMD: "sync" }

  addon-cmd:
    internal: true
    dir: "{{.ADDONS_DIR}}/{{.ADDON}}"
    env:
      KUBECONFIG: "{{.KUBECONFIG}}"
    cmds:
      - helmfile {{.HELM_CMD}}
