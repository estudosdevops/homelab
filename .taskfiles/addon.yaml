version: "3"

tasks:
  plan:
    desc: Renderiza ApplicationSet de um addon
    requires:
      vars: [addon]

    cmds:
      - ./scripts/argo-appset-generation.py {{.addon}}
      - task: show
        vars:
          addon: "{{.addon}}"

  show:
    internal: true
    cmds:
      - |
        file=./kubernetes/addons/{{.addon}}/appset.yaml

        if command -v batcat >/dev/null 2>&1; then
          batcat "$file"
        else
          cat "$file"
        fi

  apply:
    desc: Aplica ApplicationSet de um addon
    requires:
      vars: [addon]
    cmds:
      - ./scripts/argo-appset-generation.py {{.addon}} --apply

  plan-all:
    desc: Renderiza ApplicationSet todos os addons
    cmds:
      - ./scripts/argo-appset-generation.py

  apply-all:
    desc: Aplica todos os addons
    cmds:
      - ./scripts/argo-appset-generation.py --apply
